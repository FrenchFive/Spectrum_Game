name: Spectrum suggestion → PR

on:
  issues:
    types: [opened, edited, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  propose:
    # only run for spectrum suggestions (by title prefix or label)
    if: startsWith(github.event.issue.title, '[Spectrum]') || contains(github.event.issue.labels.*.name, 'spectrum-suggestion')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Parse suggestion and edit the deck
        id: edit
        run: node scripts/add-spectrum.mjs
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}

      - name: Comment if it can't be added
        if: steps.edit.outputs.status != 'ok'
        uses: actions/github-script@v7
        with:
          script: |
            const status = "${{ steps.edit.outputs.status }}";
            const body = status === "duplicate"
              ? "🌀 That spectrum is already in the deck — thanks though!"
              : "⚠️ I couldn't read a valid **Left** and **Right** pole from this suggestion. Please use the form fields (each pole is a short word or phrase).";
            await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body });

      - name: Ensure the PR label exists
        if: steps.edit.outputs.status == 'ok'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh label create new-spectrum --color FACC15 --description "Community-suggested spectrum pair" --force || true

      - name: Open the pull request
        id: cpr
        if: steps.edit.outputs.status == 'ok'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: spectrum/issue-${{ github.event.issue.number }}
          commit-message: "Add spectrum: ${{ steps.edit.outputs.left }} ↔ ${{ steps.edit.outputs.right }}"
          title: "🎯 New spectrum: ${{ steps.edit.outputs.left }} ↔ ${{ steps.edit.outputs.right }}"
          labels: new-spectrum
          add-paths: src/constants.js
          body: |
            Community-suggested spectrum from #${{ github.event.issue.number }}.

            Adds `["${{ steps.edit.outputs.left }}", "${{ steps.edit.outputs.right }}"]` to the `THEMES` deck in `src/constants.js`.

            Review the pair, then merge to ship it. Closes #${{ github.event.issue.number }}.

      - name: Link the PR back on the issue
        if: steps.edit.outputs.status == 'ok' && steps.cpr.outputs.pull-request-number
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: `✅ Opened ${{ steps.cpr.outputs.pull-request-url }} to add this spectrum. A maintainer will review and merge it.`,
            });
